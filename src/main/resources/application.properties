# Railway/Render/Cloud platforms inject PORT at runtime
server.port=${PORT:8080}

# CORS origin patterns (comma-separated)
# Set this in deployment env vars to your exact frontend URLs/domains.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,https://*.vercel.app}

# Upload size limits for CSV files
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.com.attendance.management=DEBUG
